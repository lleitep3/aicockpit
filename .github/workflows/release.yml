name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.5.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: read
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26'
    
    - name: Set version
      run: |
        NEW_VERSION="${{ github.event.inputs.version }}"
        echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
        echo "Releasing version: $NEW_VERSION"
    
    - name: Create commit
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add VERSION internal/version/version.go
        git commit -m "chore(release): bump version to ${{ env.NEW_VERSION }}"
    
    - name: Create tag
      run: |
        git tag -a "v${{ env.NEW_VERSION }}" -m "Release v${{ env.NEW_VERSION }}"
    
    - name: Generate Changelog
      run: |
        # Generate changelog for the release
        bash scripts/generate-changelog.sh ${{ env.NEW_VERSION }} > RELEASE_NOTES.md
    
    - name: Update CHANGELOG.md
      run: |
        # Prepend new release to CHANGELOG.md
        if [ -f "CHANGELOG.md" ]; then
          # Get current changelog content (skip first line if it's the header)
          CURRENT_CONTENT=$(tail -n +2 CHANGELOG.md)
          
          # Create new changelog with new release
          cat > CHANGELOG.md << 'EOF'
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

EOF
          
          # Add new release content
          cat RELEASE_NOTES.md >> CHANGELOG.md
          
          # Add existing content
          echo "" >> CHANGELOG.md
          echo "$CURRENT_CONTENT" >> CHANGELOG.md
          
          git add CHANGELOG.md
          git commit -m "docs(changelog): update CHANGELOG.md for v${{ env.NEW_VERSION }}"
        fi
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ env.NEW_VERSION }}
        name: Release v${{ env.NEW_VERSION }}
        body_path: RELEASE_NOTES.md
        draft: false
        prerelease: false
