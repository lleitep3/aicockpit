name: Release

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: read
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26'
    
    - name: Determine version bump
      id: version
      run: |
        # Get the last commit message
        COMMIT_MSG=$(git log -1 --pretty=%B)
        
        # Determine bump type from commit message
        if echo "$COMMIT_MSG" | grep -q "^feat(.*)\!:"; then
          BUMP_TYPE="major"
        elif echo "$COMMIT_MSG" | grep -q "^feat"; then
          BUMP_TYPE="minor"
        elif echo "$COMMIT_MSG" | grep -q "^fix"; then
          BUMP_TYPE="patch"
        else
          BUMP_TYPE="patch"
        fi
        
        echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
        echo "Detected bump type: $BUMP_TYPE"
    
    - name: Bump version
      run: |
        bash scripts/bump-version.sh ${{ steps.version.outputs.bump_type }}
        NEW_VERSION=$(cat VERSION)
        echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
    
    - name: Create commit
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add VERSION internal/version/version.go
        git commit -m "chore(release): bump version to ${{ env.NEW_VERSION }}"
    
    - name: Create tag
      run: |
        git tag -a "v${{ env.NEW_VERSION }}" -m "Release v${{ env.NEW_VERSION }}"
    
    - name: Push changes
      run: |
        git push origin main
        git push origin "v${{ env.NEW_VERSION }}"
    
    - name: Generate Changelog
      run: |
        bash scripts/generate-changelog.sh ${{ env.NEW_VERSION }} > RELEASE_NOTES.md
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ env.NEW_VERSION }}
        name: Release v${{ env.NEW_VERSION }}
        body_path: RELEASE_NOTES.md
        draft: false
        prerelease: false
