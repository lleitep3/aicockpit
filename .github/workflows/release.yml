name: Release

on:
  workflow_run:
    workflows:
      - "Update Changelog"
    types:
      - completed
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.5.0)'
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Bump release
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          ARGS="${{ github.event_name == 'pull_request' && '--dry-run' || '--pr' }}"
          [ -n "$INPUT_VERSION" ] && ARGS="$ARGS --version $INPUT_VERSION"
          bash scripts/bump-release.sh $ARGS

      - name: Create GitHub Release
        if: github.event_name != 'pull_request' && steps.bump.outputs.tag_name != ''
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.bump.outputs.tag_name }}
          name: ${{ steps.bump.outputs.release_name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
