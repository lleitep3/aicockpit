name: Update Changelog

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Update CHANGELOG.md
      run: |
        # Get the latest tag
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        
        if [ -z "$LATEST_TAG" ]; then
          echo "No tags found, skipping changelog update"
          exit 0
        fi
        
        echo "Latest tag: $LATEST_TAG"
        
        # Generate unreleased changes since last tag (empty version parameter)
        bash scripts/generate-changelog.sh "" "${LATEST_TAG}..HEAD" > NEW_CHANGES.md
        
        # Check if there are new changes
        if [ ! -s NEW_CHANGES.md ] || grep -q "No commits found" NEW_CHANGES.md; then
          echo "No new commits since $LATEST_TAG, skipping changelog update"
          exit 0
        fi
        
        echo "New changes detected, updating CHANGELOG.md"
        
        # Update CHANGELOG.md
        if [ -f "CHANGELOG.md" ]; then
          # Find start of historical releases (skip [Unreleased])
          HISTORICAL_START_LINE=$(grep -n "^## \[[0-9]" CHANGELOG.md | head -n 1 | cut -d: -f1)
          
          if [ -n "$HISTORICAL_START_LINE" ]; then
            HISTORICAL_CONTENT=$(tail -n +$HISTORICAL_START_LINE CHANGELOG.md)
          else
            HISTORICAL_CONTENT=$(tail -n +8 CHANGELOG.md)
          fi
          
          # Rebuild CHANGELOG.md
          cat > CHANGELOG.md << 'EOF'
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

## [Unreleased]

EOF
          # Append the new changes
          cat NEW_CHANGES.md >> CHANGELOG.md
          
          # Append the historical content
          if [ -n "$HISTORICAL_CONTENT" ]; then
            echo "" >> CHANGELOG.md
            echo "$HISTORICAL_CONTENT" >> CHANGELOG.md
          fi
        else
          echo "CHANGELOG.md not found, creating it"
          cat > CHANGELOG.md << 'EOF'
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

## [Unreleased]

EOF
          cat NEW_CHANGES.md >> CHANGELOG.md
        fi
        
        # Commit and push
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add CHANGELOG.md
        git commit -m "docs(changelog): update CHANGELOG.md for changes since $LATEST_TAG [skip ci]"
        git push