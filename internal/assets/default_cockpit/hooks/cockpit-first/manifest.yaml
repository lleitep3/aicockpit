name: "cockpit-first"
version: "1.0.0"
description: "Hook for AICockpit initialization and setup"
author: "AICockpit Team"
license: "MIT"

# Events this hook listens to
events:
  - "cockpit-init"
  - "config-load"

# Execution mode
mode: "async"

# Timeout in seconds
timeout: 30

# Configuration
config:
  enabled: true
  log_level: "info"
  retry_count: 3
  create_default_dirs: true
  initialize_kb: true
  setup_agents: true

# Dependencies
dependencies:
  go: "1.26"
  cockpit: "0.2.0"
