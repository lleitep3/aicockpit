name: "go-development"
version: "1.0.0"
description: "Skill for Go development operations"
author: "AICockpit Team"
license: "MIT"

# Skill capabilities
capabilities:
  - name: "format-code"
    description: "Format Go code using gofmt"
    parameters:
      path:
        type: "string"
        required: true
        description: "Path to Go file or directory"
      
  - name: "lint-code"
    description: "Lint Go code using golangci-lint"
    parameters:
      path:
        type: "string"
        required: true
        description: "Path to Go file or directory"
      
  - name: "run-tests"
    description: "Run Go tests"
    parameters:
      path:
        type: "string"
        required: true
        description: "Path to test directory"
      coverage:
        type: "boolean"
        required: false
        default: false
        description: "Generate coverage report"
      
  - name: "build-binary"
    description: "Build Go binary"
    parameters:
      path:
        type: "string"
        required: true
        description: "Path to main.go"
      output:
        type: "string"
        required: false
        description: "Output binary path"

# Configuration
config:
  timeout: 60
  max_retries: 2
  log_level: "info"
  go_version: "1.26"

# Dependencies
dependencies:
  go: "1.26"
  cockpit: "0.2.0"
  golangci-lint: "1.50"
