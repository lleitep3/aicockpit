run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - gosimple          # Simplifica código
    - govet             # Análise estática padrão
    - staticcheck       # Análise estática avançada
    - typecheck         # Verifica tipos
    - unused            # Detecta código não usado
    - gofmt             # Verifica formatação
    - goimports         # Verifica imports
    - misspell          # Detecta erros de digitação
    - revive            # Linter configurável
    - errorlint         # Lint de erros

linters-settings:
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-naming
      - name: error-return
      - name: error-strings
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: indent-error-flow
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: redefines-builtin-id
      - name: superfluous-else
      - name: time-naming
      - name: unexported-return
      - name: unreachable-code
      - name: var-declaration
      - name: var-naming

issues:
  exclude-dirs:
    - bin
    - vendor
  exclude-rules:
    - path: _test\.go
      linters:
        - unused
        - ineffassign
  max-issues-per-linter: 0
  max-same-issues: 0
